apiVersion: v1
kind: Namespace
metadata:
  name: my-app-ns
  labels:
     area: my-app-ns
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-app-sa
  namespace: my-app-ns
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: v1
kind: Secret
metadata:
  name: my-app-secrets
  namespace: my-app-ns
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
type: Opaque
data:
  DB_ROOT_PASSWORD: dGhlcmVpc25vcGFzc3dvcmQK  # "password" in base64
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: my-app-ns
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: boxone
        image: docker.io/library/mysql:latest
        env:
        # Define an environment variable named APP_DB_USER
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: my-app-secrets # Name of your Secret object
              key: DB_ROOT_PASSWORD # Key inside the Secret
        
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service
  namespace: my-app-ns
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: my-app
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306
  type: ClusterIP
