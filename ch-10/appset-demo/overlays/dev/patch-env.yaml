apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  template:
    metadata:
      labels:
        environment: dev
    spec:
      containers:
     - name: my-app
       image: nginx:1.21
       resources:
         limits:
           cpu: 100m
           memory: 100Mi
         requests:
           cpu: 50m
           memory: 50Mi